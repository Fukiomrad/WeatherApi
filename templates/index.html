<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        form {
            display: flex;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #667eea;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background: #5a6fd6;
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f7f8fc;
            border-radius: 12px;
            text-align: center;
        }
        .result .icon {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 8px;
        }
        .result .city-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .result .temp {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }
        .result .conditions {
            font-size: 16px;
            color: #666;
            margin-top: 4px;
        }
        .error {
            margin-top: 24px;
            padding: 16px;
            background: #fff0f0;
            border-radius: 12px;
            color: #d63031;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌤 Weather</h1>
        <p class="subtitle">Enter a city to see current conditions</p>
        <form method="get" action="/">
            <input type="text" name="city" placeholder="e.g. London" value="{{ city }}" required>
            <button type="submit">Search</button>
        </form>
        {% if weather %}
        <div class="result">
            <div class="icon">{{ weather.icon }}</div>
            <div class="city-name">{{ weather.city }}</div>
            <div class="temp">{{ weather.temp }}°C</div>
            <div class="conditions">{{ weather.conditions }}</div>
        </div>
        {% endif %}
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
